<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimetsu no Yaiba: The Final Selection</title>

    <link rel="icon" type="image/x-icon" href="pic4.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* تصفير الإعدادات الافتراضية للتحكم بالكامل بالأبعاد */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #05020a;
            color: #fff;
            font-family: 'Noto Sans Arabic', 'Urbanist', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* الحاوية الرئيسية تمتد لتملأ الشاشة بالكامل 100% */
        .game-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
        }

        /* طبقة التظليم السينمائي المحيطي */
        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 25%, rgba(0, 0, 0, 0.85) 100%);
            pointer-events: none;
            z-index: 3;
        }

        /* تأثير حركة أوراق الويستيريا المتساقطة ديناميكياً */
        .petals-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .petal {
            position: absolute;
            background: linear-gradient(135deg, #b77bf4, #703ba6);
            border-radius: 150% 0 150% 150%;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* شريط التحكم العلوي المتطور */
        .top-control-bar {
            position: absolute;
            top: 25px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .btn-top {
            background: rgba(20, 10, 30, 0.9);
            border: 2px solid #b77bf4;
            color: #fff;
            padding: 10px 22px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(183, 123, 244, 0.3);
        }

        .btn-top:hover {
            background: #b77bf4;
            color: #000;
            box-shadow: 0 0 25px #b77bf4;
            transform: scale(1.05);
        }

        /* نظام القلوب وقفل الأقنعة */
        .wisteria-heart-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .mask-hearts-box {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 15px;
            border-radius: 40px;
            border: 1px solid rgba(183, 123, 244, 0.5);
        }

        .mask-heart {
            width: 50px;
            height: 50px;
            background-image: url('mask.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 10px red);
            transition: 0.4s;
        }

        .mask-heart.lost {
            filter: grayscale(1);
            opacity: 0.25;
            transform: rotate(20deg) scale(0.8);
        }

        .cooldown-text {
            color: #ff4d4d;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 8px #000;
        }

        /* واجهات وسلايدات شاشات اللعب */
        .game-slide {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 4;
        }

        .game-slide.active-slide {
            display: block;
        }

        /* تموضع القائمة الجانبية في المساحة الفارغة جهة اليمين */
        .main-menu-right {
            position: absolute;
            right: 10%;
            top: 55%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 5;
        }

        /* تصميم أزرار السيوف اليابانية الأسطورية (Katana Sword UI) */
        .sword-btn-container {
            position: relative;
            width: 320px;
            height: 55px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .sword-hilt {
            width: 40px;
            height: 25px;
            background: linear-gradient(180deg, #e6b800 0%, #b39200 100%);
            border: 2px solid #fff;
            border-radius: 5px 0 0 5px;
            box-shadow: -3px 3px 10px rgba(0,0,0,0.5);
            position: relative;
            z-index: 6;
        }

        .sword-blade {
            flex-grow: 1;
            height: 38px;
            background: linear-gradient(180deg, #ffffff 0%, #a6a6a6 50%, #595959 100%);
            border: 1px solid #404040;
            border-radius: 0 30px 5px 0;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sword-blade::after {
            content: '';
            position: absolute;
            top: 0; left: -150%; width: 60px; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-30deg);
            transition: none;
        }

        .sword-btn-container:hover .sword-blade::after {
            left: 150%;
            transition: left 0.5s ease-in-out;
        }

        .sword-btn-container:hover .sword-blade {
            transform: scale(1.05) translateX(-10px);
            filter: drop-shadow(0 0 15px rgba(183,123,244,0.8));
            border-color: #b77bf4;
        }

        .sword-blade span {
            font-size: 18px;
            font-weight: bold;
            color: #0f0816;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
            z-index: 7;
        }

        /* حاوية الأبعاد الخاصة بالقلعة اللانهائية والمستويات */
        .inner-center-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 80px 20px 20px 20px;
        }

        .section-title {
            color: #e6b800;
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(230, 184, 0, 0.6);
        }

        .levels-container-scroll {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 20px;
            background: rgba(12, 6, 18, 0.8);
            border: 2px solid #b77bf4;
            border-radius: 12px;
        }

        .level-tile {
            aspect-ratio: 1;
            background: rgba(35, 20, 50, 0.6);
            border: 2px solid #443256;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #77658c;
            border-radius: 8px;
            cursor: not-allowed;
            position: relative;
            transition: all 0.3s ease;
        }

        .level-tile.unlocked {
            background: linear-gradient(135deg, #4c2582 0%, #170a29 100%);
            border-color: #b77bf4;
            color: #fff;
            cursor: pointer;
        }

        .level-tile.unlocked:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: #e6b800;
            box-shadow: 0 0 15px #b77bf4;
        }

        .level-lock-icon {
            font-size: 13px;
            margin-top: 4px;
            color: #e66b6b;
        }

        /* واجهة منطقة القتال والأسئلة مرنة للموبايل والـ Desktop */
        .combat-zone {
            background: rgba(8, 4, 12, 0.92);
            border: 2px solid #b77bf4;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.95);
        }

        .question-header-info {
            display: flex;
            justify-content: space-between;
            color: #e6b800;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .question-main-text {
            font-size: 24px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .answer-choice-btn {
            background: rgba(38, 22, 56, 0.6);
            border: 2px solid #443256;
            color: #fff;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .answer-choice-btn:hover {
            background: rgba(183, 123, 244, 0.25);
            border-color: #b77bf4;
            transform: translateY(-2px);
        }

        /* تعديل للموبايل والشاشات الصغيرة (Responsive Media Queries) */
        @media (max-width: 768px) {
            .main-menu-right {
                right: 5%;
                left: 5%;
                top: 60%;
                align-items: center;
            }
            .sword-btn-container {
                width: 100%;
                max-width: 300px;
            }
            .answers-grid {
                grid-template-columns: 1fr; /* صف واحد في الموبايل */
            }
            .question-main-text {
                font-size: 18px;
            }
            .levels-container-scroll {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* النوافذ العائمة المنبثقة للتحكم */
        .player-modal, .game-overlay-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 25;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #150b21;
            border: 2px solid #b77bf4;
            padding: 35px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(183, 123, 244, 0.4);
        }

        .player-select, .player-input {
            width: 100%; padding: 12px; margin-bottom: 18px;
            background: #09040f; border: 1px solid #b77bf4;
            color: #fff; border-radius: 6px; font-size: 16px; outline: none;
            text-align: center;
        }

        .slash-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }
        .slash-correct { background: rgba(0, 150, 255, 0.15); border: 4px solid #0096ff; animation: flash 0.3s ease-out; }
        .slash-wrong { background: rgba(255, 0, 0, 0.2); border: 4px solid #ff0000; animation: flash 0.3s ease-out; }

        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="game-wrapper" id="mainGameContainer" style="background-image: url('pic1.jpg');">
    <div class="vignette"></div>
    <div class="petals-container" id="petalsBox"></div>
    <div class="slash-effect" id="slashVisual"></div>

    <div class="top-control-bar">
        <button class="btn-top" id="langBtn" onclick="actionToggleLanguage()">EN</button>
        
        <div class="wisteria-heart-wrapper" id="heartsLayout">
            <div class="mask-hearts-box" id="heartsContainer"></div>
            <div class="cooldown-text" id="cooldownTimerDisplay" style="display: none;"></div>
        </div>

        <button class="btn-top" id="menuBtn" style="display: none;" onclick="actionOpenOverlayMenu()">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div class="game-slide active-slide" id="slideMainMenu">
        <div class="main-menu-right">
            <div class="sword-btn-container" onclick="triggerPlayerGate('start')">
                <div class="sword-hilt"></div>
                <div class="sword-blade"><span data-ar="ابدأ المعركة" data-en="START BATTLE">ابدأ المعركة</span></div>
            </div>
            <div class="sword-btn-container" onclick="triggerPlayerGate('score')">
                <div class="sword-hilt"></div>
                <div class="sword-blade"><span data-ar="صدارة الهدافين" data-en="HIGH SCORES">صدارة الهدافين</span></div>
            </div>
            <div class="sword-btn-container" onclick="actionOpenOverlayMenu()">
                <div class="sword-hilt"></div>
                <div class="sword-blade"><span data-ar="خيارات التنفس" data-en="OPTIONS">خيارات التنفس</span></div>
            </div>
            <div class="sword-btn-container" onclick="actionExitGame()">
                <div class="sword-hilt"></div>
                <div class="sword-blade"><span data-ar="انسحاب" data-en="EXIT">انسحاب</span></div>
            </div>
        </div>
    </div>

    <div class="game-slide" id="slideLevelMap">
        <div class="inner-center-layout">
            <h2 class="section-title" id="txtTitleLevels" data-ar="خريطة القلعة اللانهائية" data-en="INFINITY CASTLE MAP">خريطة القلعة اللانهائية</h2>
            <div class="levels-container-scroll" id="levelsGridBox"></div>
        </div>
    </div>

    <div class="game-slide" id="slideCombatZone">
        <div class="inner-center-layout">
            <div class="combat-zone">
                <div class="question-header-info">
                    <span id="lblLevelNum">مستوى: 1</span>
                    <span id="lblQuestionNum">سؤال: 1/5</span>
                </div>
                <div class="question-main-text" id="targetQuestionText">جاري استدعاء هجوم الشياطين...</div>
                <div class="answers-grid" id="targetAnswersGrid"></div>
            </div>
        </div>
    </div>

    <div class="player-modal" id="playerGateModal">
        <div class="modal-box">
            <h3 id="txtPopPlayerTitle" data-ar="تعريف قاتل الشياطين" data-en="IDENTIFY SLAYER">تعريف قاتل الشياطين</h3>
            <select class="player-select" id="comboPlayersList" onchange="checkPlayerSelection()"></select>
            <input type="text" class="player-input" id="txtNewPlayerName" placeholder="اكتب اسم لاعب جديد...">
            <button class="btn-top" style="width: 100%;" onclick="actionConfirmPlayerGate()" id="txtBtnConfirm" data-ar="تأكيد العهد" data-en="CONFIRM">تأكيد العهد</button>
        </div>
    </div>

    <div class="game-overlay-menu" id="overlayMenuPop">
        <div class="overlay-menu-content modal-box">
            <h3 style="color:#e6b800; margin-bottom: 15px;" data-ar="قائمة الدعم" data-en="SUPPORT MENU">قائمة الدعم</h3>
            <button class="btn-top" style="width:100%; margin-bottom:10px;" onclick="actionToggleMusic()" id="txtBtnMusic" data-ar="الموسيقى: تعمل" data-en="Music: ON">الموسيقى: تعمل</button>
            <button class="btn-top" style="width:100%; margin-bottom:10px;" onclick="actionToggleSFX()" id="txtBtnSFX" data-ar="المؤثرات: تعمل" data-en="SFX: ON">المؤثرات: تعمل</button>
            <button class="btn-top" id="btnBackToMap" style="width:100%; margin-bottom:10px; display:none;" onclick="actionMenuGoToMap()" data-ar="عودة للخريطة" data-en="Back to Map">عودة للخريطة</button>
            <button class="btn-top" id="btnBackToMain" style="width:100%; margin-bottom:10px; display:none;" onclick="actionMenuGoToMain()" data-ar="القائمة الرئيسية" data-en="Main Menu">القائمة الرئيسية</button>
            <button class="btn-top" style="border-color:#e66b6b; width:100%;" onclick="actionCloseOverlayMenu()" data-ar="إغلاق" data-en="Close">إغلاق</button>
            
            <div id="highScoreViewArea" style="display:none; margin-top: 15px;">
                <h4 style="color:#b77bf4;" data-ar="لوحة الصدارة" data-en="Top Scores">لوحة الصدارة</h4>
                <div id="scoreBoardItems" style="text-align:right; max-height:150px; overflow-y:auto; padding:5px;"></div>
            </div>
        </div>
    </div>
</div>

<audio id="audioBg" loop><source src="op1.MP3" type="audio/mpeg"></audio>
<audio id="audioStart"><source src="letsgo.MP3" type="audio/mpeg"></audio>
<audio id="audioClick"><source src="sword.MP3" type="audio/mpeg"></audio>

<script>
  // ==========================================
// 1. قاعدة بيانات الأسئلة المتدرجة والمثيرة
// ==========================================
const QUESTIONS_DATABASE = {
    1: [
        { text_ar: "ما هي المهنة الأساسية التي كان يمارسها تانجيرو لإعالة عائلته قبل الكارثة؟", text_en: "What was Tanjiro's primary job to support his family before the tragedy?", choices_ar: ["بيع الحطب", "بيع الفحم", "صيد الأسماك", "صناعة السلال"], choices_en: ["Wood selling", "Charcoal selling", "Fishing", "Basket making"], correct: 1 },
        { text_ar: "ما هو الاسم الياباني الرسمي والأصلي لسلسلة أنمي قاتل الشياطين؟", text_en: "What is the official Japanese name for the Demon Slayer series?", choices_ar: ["Kimetsu no Yaiba", "Shingeki no Kyojin", "Jujutsu Kaisen", "Boku no Hero"], choices_en: ["Kimetsu no Yaiba", "Shingeki no Kyojin", "Jujutsu Kaisen", "Boku no Hero"], correct: 0 },
        { text_ar: "من هو أول هاشيرا التقى به تانجيرو وحاول في البداية القضاء على نيزوكو؟", text_en: "Who is the first Hashira Tanjiro met, who initially tried to eliminate Nezuko?", choices_ar: ["رينغوكو كيوجورو", "أوزوي تينغين", "غيو توميوكا", "سانيمي شينازوغاوا"], choices_en: ["Kyojuro Rengoku", "Tengen Uzui", "Giyu Tomioka", "Sanemi Shinazugawa"], correct: 2 },
        { text_ar: "كيف تمكن تانجيرو من حماية أخته نيزوكو من أشعة الشمس الحارقة أثناء السفر نهاراً؟", text_en: "How did Tanjiro protect Nezuko from sunlight while traveling during the day?", choices_ar: ["بوشاح أسود سميك", "بصندوق خشبي على ظهره", "بالمشي في الكهوف فقط", "بمظلة خاصة من الوستارية"], choices_en: ["Thick black scarf", "Wooden box on his back", "Walking in caves", "Wisteria umbrella"], correct: 1 },
        { text_ar: "كم عدد أفراد عائلة كامادو الذين قُتلوا في الهجوم الأول قبل تحول نيزوكو؟", text_en: "How many members of the Kamado family were killed in the initial attack before Nezuko's transformation?", choices_ar: ["4 أفراد", "5 أفراد", "6 أفراد", "3 أفراد"], choices_en: ["4 members", "5 members", "6 members", "3 members"], correct: 1 }
    ],
    2: [
        { text_ar: "إلى أي جبل أرسل غيو توميوكا تانجيرو ليتلقى تدريبه الشاق على يد أوكوداكي؟", text_en: "To which mountain did Giyu send Tanjiro to train under Sakonji Urokodaki?", choices_ar: ["جبل فوجي", "جبل ساغيري", "جبل ناتاغومو", "جبل يوشينو"], choices_en: ["Mount Fuji", "Mount Sagiri", "Mount Natagumo", "Mount Yoshino"], correct: 1 },
        { text_ar: "ما هو القناع الذي يرتديه المدرب ساكونجي أوكوداكي دائماً لإخفاء وجهه؟", text_en: "What mask does Instructor Sakonji Urokodaki always wear to hide his face?", choices_ar: ["قناع ثعلب", "قناع تينغو أحمر", "قناع خنزير", "قناع هانيا شريطي"], choices_en: ["Fox mask", "Red Tengu mask", "Boar mask", "Hannya mask"], correct: 1 },
        { text_ar: "ما هي العقبة النهائية والشرط التعجيزي الذي وضعه أوكوداكي لتسميح لتانجيرو بدخول الاختيار النهائي؟", text_en: "What was the final task Urokodaki set for Tanjiro to allow him into the Final Selection?", choices_ar: ["هزيمته في قتال حقيقي", "شق صخرة ضخمة بالسيف", "البقاء حياً في الغابة لشهر", "حبس أنفاسه تحت الماء"], choices_en: ["Defeating him in battle", "Splitting a giant boulder", "Surviving for a month", "Holding breath underwater"], correct: 1 },
        { text_ar: "من هما الشخصيتان الشبحيتان اللتان ظهرتا لتانجيرو وساعدتاه في إتقان تنفس الماء لشق الصخرة؟", text_en: "Which two ghostly figures appeared to Tanjiro and helped him master Water Breathing?", choices_ar: ["سابيتو وماكومو", "غيو وكاناي", "يوشيرو وتامايو", "سوسامارو وياهابا"], choices_en: ["Sabito and Makomo", "Giyu and Kanae", "Yushiro and Tamayo", "Susamaru and Yahaba"], correct: 0 },
        { text_ar: "ما هو النمط واللون المميز لوشاح الهاؤوري الذي يرتديه تانجيرو دائماً؟", text_en: "What is the pattern and color of the Haori jacket that Tanjiro always wears?", choices_ar: ["مثلثات صفراء وبيضاء", "مربعات خضراء وسوداء", "تموجات مياه زرقاء", "لهب أحمر وأصفر"], choices_en: ["Yellow triangles", "Green & black checkered", "Blue water waves", "Red & yellow flames"], correct: 1 }

// 🧠 دالة تحميل السؤال وعرض البيانات والميديا المتطابقة مع الأسماء الجديدة
function loadQuestion() {
    if (currentAudioObj) {
        currentAudioObj.pause();
        currentAudioObj = null;
    }

    for (let lvl in RANK_TITLES) {
        if (currentLevel >= parseInt(lvl)) {
            document.getElementById("rankTitle").innerText = RANK_TITLES[lvl];
        }
    }

    // جلب الـ Array الخاصة بالمستوى الحالي مباشرة
    let currentLevelQuestions = QUESTIONS_DATABASE[currentLevel];
    let currentQ = currentLevelQuestions[currentQuestionIdxInLevel];

    document.getElementById("currentLevel").innerText = currentLevel;
    document.getElementById("currentQuestionNum").innerText = currentQuestionIdxInLevel + 1;
    document.getElementById("scoreText").innerText = score;

    // استخدام المسميات الجديدة بالظبط هنا 🌟
    document.getElementById("questionAr").innerText = currentQ.text_ar;
    document.getElementById("questionEn").innerText = currentQ.text_en;

    const mediaBox = document.getElementById("mediaBox");
    const qImage = document.getElementById("qImage");
    const qAudioBtn = document.getElementById("qAudioBtn");

    if (currentQ.image || currentQ.audio) {
        mediaBox.style.display = "flex";
        
        if (currentQ.image) {
            qImage.src = currentQ.image;
            qImage.style.display = "block";
        } else {
            qImage.style.display = "none";
        }

        if (currentQ.audio) {
            qAudioBtn.style.display = "block";
            qAudioBtn.onclick = function() {
                if (currentAudioObj) currentAudioObj.pause();
                currentAudioObj = new Audio(currentQ.audio);
                currentAudioObj.play();
            };
        } else {
            qAudioBtn.style.display = "none";
        }
    } else {
        mediaBox.style.display = "none";
    }

    const optionsBox = document.getElementById("optionsBox");
    optionsBox.innerHTML = "";
    
    // استخدام choices_ar لعرض الخيارات باللغة العربية واستهداف الرقم الصحيح correct
    currentQ.choices_ar.forEach((optText, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = optText;
        btn.onclick = function() { checkAnswer(index, currentQ.correct); };
        optionsBox.appendChild(btn);
    });
}
    // ==========================================
    // 2. إدارة الحالة ونظام توقيت استعادة القلوب الشامل (Global State)
    // ==========================================
    let appLanguage = 'ar';
    let isMusicEnabled = true;
    let isSFXEnabled = true;
    
    let currentSlayerName = "";
    let globalSlayersData = {}; 
    let activeLevel = 1;
    let activeQuestionIdx = 0;
    let currentGatePurpose = "start";

    function initFallingPetals() {
        const box = document.getElementById('petalsBox');
        box.innerHTML = "";
        for (let i = 0; i < 25; i++) {
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.width = Math.random() * 12 + 6 + 'px';
            petal.style.height = Math.random() * 16 + 8 + 'px';
            petal.style.animationDuration = Math.random() * 5 + 4 + 's';
            petal.style.animationDelay = Math.random() * 4 + 's';
            box.appendChild(petal);
        }
    }

    // تشغيل الموسيقى فور تفاعل المستخدم مع الصفحة لحل مشكلة قيود المتصفح
    window.onload = function() {
        initFallingPetals();
        loadDataFromStorage();
        generateInfinityCastleGrid();
        applyLanguageStrings();
        setInterval(processHeartsRegeneration, 1000);

        // هنا السحر! أول ما اللمسة أو الضغطة الأولى تحصل في اللعبة، الموسيقى تبدأ فوراً
        const startMusicOnInteraction = () => {
            if (isMusicEnabled) {
                const bg = document.getElementById('audioBg');
                bg.play().catch(() => {});
            }
            // نفك الاستماع بعد أول تفاعل عشان ميتكررش الأمر على الفاضي
            window.removeEventListener('click', startMusicOnInteraction);
            window.removeEventListener('touchstart', startMusicOnInteraction);
        };

        window.addEventListener('click', startMusicOnInteraction);
        window.addEventListener('touchstart', startMusicOnInteraction);
    };

    function loadDataFromStorage() {
        let saved = localStorage.getItem('kimetsu_slayers_db');
        if(saved) {
            globalSlayersData = JSON.parse(saved);
        } else {
            globalSlayersData = {
                "Slayer_Tanjiro": { highestLevel: 1, unlockedLevels: [1], scores: 0, currentLives: 5, lastHeartLostTime: null }
            };
            saveDataToStorage();
        }
    }

    function saveDataToStorage() {
        localStorage.setItem('kimetsu_slayers_db', JSON.stringify(globalSlayersData));
    }

    function processHeartsRegeneration() {
        if (!currentSlayerName || !globalSlayersData[currentSlayerName]) return;
        let p = globalSlayersData[currentSlayerName];

        if (p.currentLives === undefined) p.currentLives = 5;
        if (!p.lastHeartLostTime) p.lastHeartLostTime = null;

        if (p.currentLives < 5 && p.lastHeartLostTime) {
            let now = Date.now();
            let elapsed = now - p.lastHeartLostTime;
            let cooldownDuration = 2 * 60 * 1000; 

            if (elapsed >= cooldownDuration) {
                p.currentLives++;
                if (p.currentLives < 5) {
                    p.lastHeartLostTime = now; 
                } else {
                    p.lastHeartLostTime = null;
                }
                saveDataToStorage();
                drawMaskHearts();
            } else {
                let remainingSecs = Math.ceil((cooldownDuration - elapsed) / 1000);
                let displayStr = appLanguage === 'ar' ? `استعادة قناع خلال: ${remainingSecs} ث` : `Regen Mask in: ${remainingSecs}s`;
                document.getElementById('cooldownTimerDisplay').innerText = displayStr;
                document.getElementById('cooldownTimerDisplay').style.display = 'block';
                return;
            }
        }
        document.getElementById('cooldownTimerDisplay').style.display = 'none';
    }

    function drawMaskHearts() {
        const container = document.getElementById('heartsContainer');
        container.innerHTML = "";
        
        let currentLives = 5;
        if(currentSlayerName && globalSlayersData[currentSlayerName]) {
            currentLives = globalSlayersData[currentSlayerName].currentLives;
        }

        for (let i = 1; i <= 5; i++) {
            let maskDiv = document.createElement('div');
            maskDiv.className = "mask-heart";
            if (i > currentLives) {
                maskDiv.classList.add('lost');
            }
            container.appendChild(maskDiv);
        }
    }

    function generateInfinityCastleGrid() {
        const grid = document.getElementById('levelsGridBox');
        grid.innerHTML = "";
        let unlocked = [1];
        if(currentSlayerName && globalSlayersData[currentSlayerName]) {
            unlocked = globalSlayersData[currentSlayerName].unlockedLevels || [1];
        }

        for (let i = 1; i <= 30; i++) {
            const tile = document.createElement('div');
            let isUnlocked = unlocked.includes(i);
            tile.className = `level-tile ${isUnlocked ? 'unlocked' : ''}`;
            tile.innerHTML = `<span>${i}</span>`;
            
            if(!isUnlocked) {
                tile.innerHTML += `<i class="fa-solid fa-lock level-lock-icon"></i>`;
            } else {
                tile.onclick = function() {
                    let p = globalSlayersData[currentSlayerName];
                    if (p.currentLives <= 0) {
                        alert(appLanguage === 'ar' ? "ليس لديك أي أقنعة للقتال! انتظر حتى تنتهي مدة الاستعادة." : "No masks available! Please wait for regeneration.");
                        return;
                    }
                    playSfx('audioClick');
                    launchCombatLevel(i);
                };
            }
            grid.appendChild(tile);
        }
    }

    function triggerPlayerGate(purpose) {
        currentGatePurpose = purpose;
        playSfx('audioClick');
        const combo = document.getElementById('comboPlayersList');
        combo.innerHTML = `<option value="NEW">${appLanguage==='ar'?'-- سجل لاعب جديد --':'-- Register New Slayer --'}</option>`;
        
        for(let name in globalSlayersData) {
            combo.innerHTML += `<option value="${name}">${name}</option>`;
        }
        document.getElementById('playerGateModal').style.display = 'flex';
        checkPlayerSelection();
    }

    function checkPlayerSelection() {
        const combo = document.getElementById('comboPlayersList');
        document.getElementById('txtNewPlayerName').style.display = (combo.value === "NEW") ? "block" : "none";
    }

    function actionConfirmPlayerGate() {
        const combo = document.getElementById('comboPlayersList');
        let chosenName = combo.value;

        if(chosenName === "NEW") {
            let inputName = document.getElementById('txtNewPlayerName').value.trim();
            if(!inputName) {
                alert(appLanguage === 'ar' ? "ادخل اسم المحارب أولاً!" : "Enter Slayer name first!");
                return;
            }
            if(globalSlayersData[inputName]) {
                alert(appLanguage === 'ar' ? "هذا الاسم مسجل!" : "Name already exists!");
                return;
            }
            globalSlayersData[inputName] = { highestLevel: 1, unlockedLevels: [1], scores: 0, currentLives: 5, lastHeartLostTime: null };
            chosenName = inputName;
            saveDataToStorage();
        }

        currentSlayerName = chosenName;
        document.getElementById('playerGateModal').style.display = 'none';
        document.getElementById('txtNewPlayerName').value = "";

        drawMaskHearts();

        if(currentGatePurpose === "start") {
            // نوقف نغمة البداية المستمرة للحظة عشان نشغل صوت تانجيرو المميز
            const bg = document.getElementById('audioBg');
            bg.pause();
            
            playSfx('audioStart');
            setTimeout(() => {
                document.getElementById('mainGameContainer').style.backgroundImage = "url('pic2.jpg')";
                generateInfinityCastleGrid();
                switchSlide('slideLevelMap');
                // نرجع نشغل موسيقى الخلفية تكمل معانا في الخريطة
                if(isMusicEnabled) bg.play().catch(()=>{});
            }, 600);
        } else if(currentGatePurpose === "score") {
            renderHighScoresList();
        }
    }

    function renderHighScoresList() {
        document.getElementById('highScoreViewArea').style.display = "block";
        const box = document.getElementById('scoreBoardItems');
        box.innerHTML = "";
        for(let name in globalSlayersData) {
            let p = globalSlayersData[name];
            box.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid rgba(183,123,244,0.2);">
                    <span style="color:#e6b800;">${name}</span>
                    <span>${appLanguage==='ar'?'مستوى':'Lvl'} ${p.highestLevel || 1} (${p.scores || 0} Pts)</span>
                </div>`;
        }
        document.getElementById('overlayMenuPop').style.display = 'flex';
    }

    function launchCombatLevel(levelNum) {
        activeLevel = levelNum;
        activeQuestionIdx = 0;
        
        document.getElementById('lblLevelNum').innerText = (appLanguage==='ar'?'المستوى: ':'Level: ') + activeLevel;
        drawMaskHearts();
        renderCurrentQuestion();
        switchSlide('slideCombatZone');
    }

    function renderCurrentQuestion() {
        document.getElementById('lblQuestionNum').innerText = `${appLanguage==='ar'?'سؤال':'Q'}: ${activeQuestionIdx + 1}/5`;
        let currentQuestion = QUESTIONS_DATABASE[activeLevel][activeQuestionIdx];
        document.getElementById('targetQuestionText').innerText = appLanguage === 'ar' ? currentQuestion.text_ar : currentQuestion.text_en;
        
        const grid = document.getElementById('targetAnswersGrid');
        grid.innerHTML = "";

        let choices = appLanguage === 'ar' ? currentQuestion.choices_ar : currentQuestion.choices_en;
        choices.forEach((choice, idx) => {
            let btn = document.createElement('button');
            btn.className = "answer-choice-btn";
            btn.innerText = choice;
            btn.onclick = function() { evaluatePlayerAnswer(idx); };
            grid.appendChild(btn);
        });
    }

    function evaluatePlayerAnswer(chosenIdx) {
        let currentQuestion = QUESTIONS_DATABASE[activeLevel][activeQuestionIdx];
        const vfx = document.getElementById('slashVisual');
        let p = globalSlayersData[currentSlayerName];

        if(chosenIdx === currentQuestion.correct) {
            vfx.className = "slash-effect slash-correct";
            vfx.style.display = "block";
            playSfx('audioClick');
            p.scores += 15;
            saveDataToStorage();
            setTimeout(() => { vfx.style.display = "none"; moveNextStep(); }, 300);
        } else {
            vfx.className = "slash-effect slash-wrong";
            vfx.style.display = "block";
            playSfx('audioClick');
            
            p.currentLives--;
            if (!p.lastHeartLostTime) {
                p.lastHeartLostTime = Date.now(); 
            }
            saveDataToStorage();
            drawMaskHearts();

            setTimeout(() => { 
                vfx.style.display = "none"; 
                if(p.currentLives <= 0) {
                    alert(appLanguage === 'ar' ? "انتهت أقنعتك! تم طردك خارج القلعة حتى تستعيد طاقتك." : "Out of masks! Retreting from Infinity Castle.");
                    actionMenuGoToMap();
                } else {
                    moveNextStep();
                }
            }, 300);
        }
    }

    function moveNextStep() {
        activeQuestionIdx++;
        if(activeQuestionIdx < 5) {
            renderCurrentQuestion();
        } else {
            alert(appLanguage === 'ar' ? `نصر ساحق! طهرت المستوى ${activeLevel}` : `Victory! Level ${activeLevel} Cleared!`);
            let p = globalSlayersData[currentSlayerName];
            if(!p.unlockedLevels.includes(activeLevel + 1) && activeLevel < 30) {
                p.unlockedLevels.push(activeLevel + 1);
            }
            if(activeLevel > (p.highestLevel || 1)) { p.highestLevel = activeLevel; }
            saveDataToStorage();
            actionMenuGoToMap();
        }
    }

    function switchSlide(slideId) {
        document.querySelectorAll('.game-slide').forEach(s => s.classList.remove('active-slide'));
        document.getElementById(slideId).classList.add('active-slide');

        if(slideId === 'slideMainMenu') {
            document.getElementById('menuBtn').style.display = "none";
            document.getElementById('btnBackToMap').style.display = "none";
            document.getElementById('btnBackToMain').style.display = "none";
        } else if(slideId === 'slideLevelMap') {
            document.getElementById('menuBtn').style.display = "block";
            document.getElementById('btnBackToMap').style.display = "none";
            document.getElementById('btnBackToMain').style.display = "block";
        } else if(slideId === 'slideCombatZone') {
            document.getElementById('menuBtn').style.display = "block";
            document.getElementById('btnBackToMap').style.display = "block";
            document.getElementById('btnBackToMain').style.display = "block";
        }
    }

    function actionToggleLanguage() {
        appLanguage = appLanguage === 'ar' ? 'en' : 'ar';
        document.getElementById('langBtn').innerText = appLanguage === 'ar' ? 'EN' : 'AR';
        document.body.dir = appLanguage === 'ar' ? 'rtl' : 'ltr';
        applyLanguageStrings();
        if(document.getElementById('slideCombatZone').classList.contains('active-slide')) { renderCurrentQuestion(); }
    }

    function applyLanguageStrings() {
        document.querySelectorAll('[data-ar]').forEach(el => {
            el.innerText = appLanguage === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
        });
    }

    function actionOpenOverlayMenu() { playSfx('audioClick'); document.getElementById('overlayMenuPop').style.display = "flex"; }
    function actionCloseOverlayMenu() { document.getElementById('overlayMenuPop').style.display = "none"; document.getElementById('highScoreViewArea').style.display = "none"; }
    function actionMenuGoToMap() { actionCloseOverlayMenu(); generateInfinityCastleGrid(); switchSlide('slideLevelMap'); }
    function actionMenuGoToMain() { actionCloseOverlayMenu(); document.getElementById('mainGameContainer').style.backgroundImage = "url('pic1.jpg')"; switchSlide('slideMainMenu'); }

    function actionToggleMusic() {
        isMusicEnabled = !isMusicEnabled;
        const bg = document.getElementById('audioBg');
        if(isMusicEnabled) { bg.play().catch(()=>{}); document.getElementById('txtBtnMusic').innerText = appLanguage==='ar'?"الموسيقى: تعمل":"Music: ON"; }
        else { bg.pause(); document.getElementById('txtBtnMusic').innerText = appLanguage==='ar'?"الموسيقى: معطلة":"Music: OFF"; }
    }

    function actionToggleSFX() {
        isSFXEnabled = !isSFXEnabled;
        document.getElementById('txtBtnSFX').innerText = isSFXEnabled ? (appLanguage==='ar'?"المؤثرات: تعمل":"SFX: ON") : (appLanguage==='ar'?"المؤثرات: معطلة":"SFX: OFF");
    }

    function playSfx(id) {
        if(isSFXEnabled) { const s = document.getElementById(id); if(s) { s.currentTime = 0; s.play().catch(()=>{}); } }
    }

    function actionExitGame() {
        if(confirm(appLanguage==='ar'?"هل تود الانسحاب؟":"Exit game?")) { alert(appLanguage==='ar'?"سايونارا!":"Sayonara!"); window.close(); }
    }
</script>

</body>
</html>
